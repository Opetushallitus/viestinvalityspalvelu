# Local development profile: authenticate against the local Keycloak (CAS protocol)
# started by integraatio/docker/docker-compose.yml instead of the real OPH virkailija CAS.
# See viestinvalitys-service/keycloak/ for the Keycloak image, realm and quick-login theme.

# CAS points at the local Keycloak cas-virkailija realm.
web.url.cas=http://localhost:8888/realms/cas-virkailija/protocol/cas
# Browser talks to the viestinvalitys-ui dev server, which proxies /raportointi/** to :8081,
# so the CAS service (callback) URL must be the UI origin.
cas-service.service=http://localhost:3000
cas-service.key=viestinvalitys
# After login, send the browser back to the viestinvalitys-ui dev server (separate origin).
raportointi.login-success-url=http://localhost:3000/raportointi
# localhost is served over http locally, so the session cookie must not require https.
cas-service.cookie-secure=false

# Run the shared Flyway migrations (src/main/resources/flyway) on startup. This replaces the
# old integraatio DevApp / migraatio Lambda for local development and creates the whole schema,
# including the session table (RAPORTOINTI_SESSION). We keep spring.session.jdbc.initialize-schema=never
# so Spring Session does not try to create its own tables. out-of-order=true (from
# application.properties) matches the migraatio Lambda so timestamped migrations apply regardless
# of order. After migration LocalDataInitializer seeds representative test data.
# spring.flyway.enabled=true

# Log the granted authorities so the Keycloak roles -> Spring authorities mapping can be verified.
logging.level.org.springframework.security=DEBUG

# S3 points at the local LocalStack (integraatio/docker/docker-compose.yml) with path-style
# addressing, matching AwsUtil's LOCAL mode. Only used when the downloadViesti feature is enabled
# and the message actually has attachments; text/HTML messages never call S3. Note the run script
# only waits for Postgres, so start LocalStack separately if you need attachment downloads locally.
aws.region=us-east-1
aws.s3.endpoint=http://localhost:4566
aws.s3.path-style-access=true
