server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/viestinvalityspalvelu
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.session.jdbc.table-name=RAPORTOINTI_SESSION
spring.session.jdbc.initialize-schema=never
spring.session.timeout=3600

spring.flyway.enabled=true
spring.flyway.locations=classpath:flyway
previous-impl.lambdat.migraatio.spring.flyway.out-of-order=true
spring.flyway.out-of-order=${previous-impl.lambdat.migraatio.spring.flyway.out-of-order}

management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator

web.url.cas=https://virkailija.hahtuvaopintopolku.fi/cas
host.virkailija=https://virkailija.hahtuvaopintopolku.fi
cas-service.service=https://hahtuva.viestinvalityspalvelu.opintopolku.fi
cas-service.key=viestinvalityspalvelu

logging.level.fi.vm.sade.viestinvalitys=INFO
logging.level.org.springframework.security=WARN

spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

opintopolku.domain=hahtuvaopintopolku.fi
viestinvalitys.url=https://hahtuva.viestinvalityspalvelu.opintopolku.fi
attachments.bucket.name=attachments-bucket-name

aws.region=${AWS_REGION:eu-west-1}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.s3.path-style-access=${AWS_S3_PATH_STYLE_ACCESS:false}
