# Test configuration for viestinvalitys-service integration tests.
#
# These are real integration tests: they boot the full Spring context and talk to
# a real PostgreSQL, exactly like the tiedotuspalvelu and oppijanumerorekisteri
# test suites. Nothing here is mocked except genuinely external HTTP services
# (those are stubbed per-test with WireMock).
#
# Start the dedicated test database before running the tests (from the repo root):
#   (cd integraatio/docker && docker compose up -d test-postgres)
# This is a separate container from the dev database (which is on 5432); the test DB
# listens on 5433 so test runs never touch dev data. Flyway builds the schema into the
# empty database on context startup.

spring.datasource.url=jdbc:postgresql://localhost:5433/viestinvalityspalvelu
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=0

spring.flyway.enabled=true
spring.flyway.locations=classpath:flyway
spring.flyway.out-of-order=true

# Session schema is created by Flyway (RAPORTOINTI_SESSION), so don't let
# spring-session try to create it.
spring.session.jdbc.table-name=RAPORTOINTI_SESSION
spring.session.jdbc.initialize-schema=never

# Fixed port so the CAS callback service URL is stable in RequestCallerFilterTest
# (which runs a real server via webEnvironment = DEFINED_PORT).
server.port=8080

# For most tests the CAS beans are constructed at startup but never contacted
# (auth comes from @WithMockUser). web.url.cas is overridden with WireMock's base
# URL in RequestCallerFilterTest to drive a real CAS login flow, and host.virkailija
# is overridden with WireMock in the tests that exercise the oppijanumerorekisteri client.
web.url.cas=http://localhost/cas
host.virkailija=http://localhost
cas-service.service=http://localhost:8080
cas-service.key=viestinvalitys
cas-service.cookie-secure=false

logging.level.fi.vm.sade.viestinvalitys=INFO
logging.level.org.flywaydb=WARN
